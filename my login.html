<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceBook</title>
    <style>
        body{
            height: 100vh;
            background-color: rgb(241, 241, 238);
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin-top: 10px;
        }
        .form-container{
            border: 2px solid #ddd;
            height: 60%;
            width: 70%;
            border-radius: 5px;
            padding: 10px;
            margin: 10px;
            margin-left:15%;
            background-color: transparent;
            justify-content:center;
            align-items: center;
            background-color: white;
              
        }
        h3{
            font-size: 19px;
            font-weight: bold;
            padding-right: 160px;
        }
        input{
            padding: 10px;
            width: 75%;
            border: 1px solid #ddd;
            border-radius: 10px;
            background-color: white;
        }
        label{
            font-size: 20px;
            color: darkblue;
        }
        button{
            padding: 5px;
            width: 75%;
            background-color: darkblue;
            border: none;
            border-radius: 10px;
            color: #fff;
        }
         
    </style>

    
        
</head>
<body>
    <form class="form-container"> 
         <h3>Login to MyShop</h3>
         <input type="text" placeholder="Email or Phone Number"><br><br>
         <input type="password" placeholder="Password"><br><br>
        <button>Log In</button><br><br>
        <center><a href="#">Forgotten Password?</a><br><br></center>
        <button style="background-color:green;color:white;">Create New Account</button> <br><br>
        
    </form>
         
</body>
</html>
